name: PR CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Repo checks — lint, validate agents, manage.py check, compose config
  # ---------------------------------------------------------------------------
  repo-checks:
    name: Repo Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install project and dev dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e '.[rag,dev]'

      - name: Ensure CI scripts are executable
        run: chmod +x scripts/ci/*.sh

      - name: Run repo checks
        run: PYTHON_BIN=python ./scripts/ci/run_repo_checks.sh

  # ---------------------------------------------------------------------------
  # Job 2: Python tests — install [rag,dev] extras and run full pytest suite
  # ---------------------------------------------------------------------------
  python-tests:
    name: Python Tests (${{ matrix.test_scope }})
    needs: repo-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        test_scope:
          - unit
          - integration
          - smoke

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install project and dev dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e '.[rag,dev]'

      - name: Ensure CI scripts are executable
        run: chmod +x scripts/ci/*.sh

      - name: Run sharded Python tests
        run: TEST_SCOPE=${{ matrix.test_scope }} PYTHON_BIN=python ./scripts/ci/run_python_tests.sh

  # ---------------------------------------------------------------------------
  # Job 3: Container validation — build image, run check + migrate smoke
  # ---------------------------------------------------------------------------
  container-validation:
    name: Container Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure CI scripts are executable
        run: chmod +x scripts/ci/*.sh

      - name: Run container validation
        run: ./scripts/ci/run_container_validation.sh

  # ---------------------------------------------------------------------------
  # Job 4: Coverage — full suite with a coverage gate (--cov-fail-under=95; actual 100%)
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage
    needs: repo-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install project and dev dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e '.[rag,dev]'

      - name: Run tests with coverage gate
        run: python -m pytest -q --cov --cov-report=term-missing --cov-fail-under=95

  # ---------------------------------------------------------------------------
  # Job 5: Security — bandit static scan (gate) + pip-audit (informational)
  # ---------------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install security tooling
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit

      - name: Bandit static analysis (app code)
        run: bandit -c pyproject.toml -r apps config -ll

      - name: pip-audit (dependency advisories, informational)
        continue-on-error: true
        run: pip-audit --skip-editable || true
