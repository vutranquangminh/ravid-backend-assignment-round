version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
    labels:
      - "ci"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"

  - package-ecosystem: "docker"
    directory: "/docker/django"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
    labels:
      - "ci"
