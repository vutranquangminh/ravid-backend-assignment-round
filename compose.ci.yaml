# CI compose — lean stack for container smoke tests.
# No env_file; sentinel values are hardcoded.
# Uses config.settings.test so no real services (postgres/redis/chroma) needed
# for the Django check and pytest runs.
#
# Usage (GitHub Actions):
#   docker compose -f compose.ci.yaml build app
#   docker compose -f compose.ci.yaml run --rm app python manage.py check
#   docker compose -f compose.ci.yaml run --rm app python -m pytest -q

name: ravid-ci

services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ravid
      POSTGRES_USER: ravid
      POSTGRES_PASSWORD: ravid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ravid -d ravid"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  app:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    entrypoint: []
    command: ["python", "manage.py", "check", "--settings=config.settings.test"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-secret-key-with-at-least-thirty-two-bytes-long
      DEBUG: "0"
      ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      POSTGRES_DB: ravid
      POSTGRES_USER: ravid
      POSTGRES_PASSWORD: ravid
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OPENROUTER_API_KEY: sentinel-not-used
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
